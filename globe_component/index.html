<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SIGNAL · Globe</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0c0c0c;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #e8e3d6;
    width: 100%;
    height: 100%;
  }
  #globeViz {
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  #globeViz:active { cursor: grabbing; }

  .country-label {
    background: #141414;
    border: 1px solid #c9a84c;
    padding: 7px 11px;
    border-radius: 2px;
    pointer-events: none;
    white-space: nowrap;
    font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    font-size: 11px;
    line-height: 1.45;
    color: #e8e3d6;
    text-align: left;
    letter-spacing: 0.05em;
    min-width: 140px;
    transform: translateY(-26px);
    box-shadow: 0 0 18px rgba(0,0,0,0.55);
  }
  .country-label .cl-name {
    color: #c9a84c;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 10.5px;
    margin-bottom: 3px;
  }
  .country-label .cl-pe {
    color: #e8e3d6;
    margin-bottom: 2px;
  }
  .country-label .cl-band {
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-size: 10px;
  }

  #status {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #6a6555;
    pointer-events: none;
    z-index: 10;
  }

  #current {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #c9a84c;
    pointer-events: none;
    z-index: 10;
    text-align: right;
    max-width: 60%;
  }

  #hint {
    position: absolute;
    bottom: 12px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #4a4538;
    pointer-events: none;
    z-index: 10;
  }
</style>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.32.6/dist/globe.gl.min.js"></script>
</head>
<body>
<div id="globeViz"></div>
<div id="status">◆ Global Markets</div>
<div id="current"></div>
<div id="hint">Tap a node · drag to rotate</div>

<script>
  const GOLD = '#c9a84c';
  const GOLD_RGB = '201, 168, 76';
  const HOT = '#fff5d8';
  const FALLBACK = '#c9a84c';

  function hexToRgb(hex) {
    const h = hex.replace('#','');
    const n = parseInt(h, 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }

  // ───── Streamlit bridge (postMessage protocol) ─────
  function sendMessage(type, data) {
    const msg = Object.assign({ isStreamlitMessage: true, type: 'streamlit:' + type }, data);
    window.parent.postMessage(msg, '*');
  }
  function sendReady() { sendMessage('componentReady', { apiVersion: 1 }); }
  function setHeight(h) { sendMessage('setFrameHeight', { height: h }); }
  function sendValue(value) {
    sendMessage('setComponentValue', { value: value, dataType: 'json' });
  }

  let globe = null;
  let lastClicked = null;
  let clickSeq = 0;
  let markets = [];

  function nodeColor(d) {
    if (d === lastClicked) return HOT;
    return d && d.color ? d.color : FALLBACK;
  }

  function ringColorFn(d) {
    const hex = (d && d.color) ? d.color : FALLBACK;
    const [r, g, b] = hexToRgb(hex);
    return (t => `rgba(${r}, ${g}, ${b}, ${0.85 * (1 - t)})`);
  }

  function tooltipHtml(d) {
    const name = (d.name || '').toUpperCase();
    const pe = (d.pe != null) ? (Number(d.pe).toFixed(1) + 'x') : '—';
    const band = d.band || 'NO DATA';
    const bandColor = d.color || FALLBACK;
    return `<div class="country-label">
      <div class="cl-name">${name}</div>
      <div class="cl-pe">P/E&nbsp;&nbsp;${pe}</div>
      <div class="cl-band" style="color:${bandColor}">${band}</div>
    </div>`;
  }

  function buildGlobe(data) {
    markets = data;
    const el = document.getElementById('globeViz');
    const w = el.clientWidth || window.innerWidth;
    const h = el.clientHeight || window.innerHeight;

    globe = Globe()(el)
      .width(w)
      .height(h)
      .backgroundColor('#0c0c0c')
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
      .showAtmosphere(true)
      .atmosphereColor(GOLD)
      .atmosphereAltitude(0.18)
      .pointsData(markets)
      .pointLat('lat').pointLng('lng')
      .pointColor(nodeColor)
      .pointRadius(0.62)
      .pointAltitude(0.014)
      .pointLabel(tooltipHtml)
      .onPointClick(handleClick)
      .ringsData(markets)
      .ringLat('lat').ringLng('lng')
      .ringColor(ringColorFn)
      .ringMaxRadius(d => d === lastClicked ? 6 : 2.8)
      .ringPropagationSpeed(d => d === lastClicked ? 3.5 : 1.3)
      .ringRepeatPeriod(d => d === lastClicked ? 600 : 1800)
      .ringAltitude(0.008);

    const controls = globe.controls();
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.35;
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 180;
    controls.maxDistance = 500;

    // Slight camera tilt
    globe.pointOfView({ lat: 20, lng: -20, altitude: 2.2 }, 0);

    // Pause auto-rotate on user interaction
    el.addEventListener('pointerdown', () => { controls.autoRotate = false; });

    window.addEventListener('resize', resize);
  }

  function updateMarkets(data) {
    if (!globe) return;
    markets = data;
    globe
      .pointsData(markets)
      .pointColor(nodeColor)
      .ringsData(markets)
      .ringColor(ringColorFn)
      .ringMaxRadius(d => d === lastClicked ? 6 : 2.8)
      .ringPropagationSpeed(d => d === lastClicked ? 3.5 : 1.3)
      .ringRepeatPeriod(d => d === lastClicked ? 600 : 1800);
  }

  function resize() {
    if (!globe) return;
    const el = document.getElementById('globeViz');
    globe.width(el.clientWidth).height(el.clientHeight);
  }

  function refreshVisuals() {
    if (!globe) return;
    globe
      .pointColor(nodeColor)
      .ringColor(ringColorFn)
      .ringMaxRadius(d => d === lastClicked ? 6 : 2.8)
      .ringPropagationSpeed(d => d === lastClicked ? 3.5 : 1.3)
      .ringRepeatPeriod(d => d === lastClicked ? 600 : 1800);
  }

  function handleClick(d) {
    lastClicked = d;
    clickSeq += 1;
    refreshVisuals();
    globe.controls().autoRotate = false;
    globe.pointOfView({ lat: d.lat, lng: d.lng, altitude: 1.8 }, 900);
    document.getElementById('current').textContent = '◆ ' + d.name;
    sendValue({
      country: d.name,
      lat: d.lat,
      lng: d.lng,
      click_id: clickSeq + '-' + Date.now()
    });
  }

  // ───── Streamlit render handshake ─────
  let initialized = false;
  window.addEventListener('message', (event) => {
    const data = event.data || {};
    if (data.type === 'streamlit:render') {
      const args = (data.args || {});
      const height = args.height || 560;
      const el = document.getElementById('globeViz');
      el.style.height = height + 'px';
      document.body.style.height = height + 'px';
      setHeight(height);

      if (!initialized) {
        initialized = true;
        buildGlobe(args.markets || []);
      } else {
        updateMarkets(args.markets || []);
        resize();
      }
    }
  });

  sendReady();
</script>
</body>
</html>
