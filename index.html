<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ANI TERMINAL — Macro Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0A0E1A; --panel:#0D1424; --panel2:#101A2E; --border:#1B2436; --line:#131B2C;
  --txt:#D6DEEB; --dim:#647089; --teal:#00D4C8; --up:#00D47E; --dn:#FF4D6D; --amb:#FFB020; --pur:#8B7CF6;
  --mono:'IBM Plex Mono',ui-monospace,monospace; --sans:'Inter',sans-serif;
}
*{box-sizing:border-box; border-radius:0 !important; margin:0; padding:0;}
html,body{height:100%;}
body{background:var(--bg); color:var(--txt); font-family:var(--sans); font-size:12px; overflow:hidden;}
::-webkit-scrollbar{width:8px;height:8px;} ::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);} ::-webkit-scrollbar-thumb:hover{background:#2A3650;}
input,textarea,select,button{font-family:var(--mono); color:var(--txt); background:#0A1020; border:1px solid var(--border); outline:none;}
input:focus,textarea:focus{border-color:var(--teal);}
input[type=range]{accent-color:var(--teal); background:transparent; border:none; width:100%;}
button{cursor:pointer;}
.mono{font-family:var(--mono);} .up{color:var(--up);} .dn{color:var(--dn);} .dim{color:var(--dim);} .amb{color:var(--amb);} .teal{color:var(--teal);}
.app{display:flex; flex-direction:column; height:100vh;}
/* ── TICKER ── */
.ticker{height:30px; min-height:30px; border-bottom:1px solid var(--border); overflow:hidden; background:#070B14; position:relative;}
.tickwrap{display:flex; width:max-content; height:100%; align-items:center; animation:tickmove 55s linear infinite;}
.ticker:hover .tickwrap{animation-play-state:paused;}
@keyframes tickmove{from{transform:translateX(0);} to{transform:translateX(-50%);}}
.titem{display:flex; align-items:baseline; gap:6px; padding:0 18px; border-right:1px solid var(--line); font-family:var(--mono); font-size:11px; white-space:nowrap;}
.titem .tlb{color:var(--dim); font-family:var(--sans); font-weight:700; font-size:10px; letter-spacing:1px;}
.tickstat{position:absolute; right:0; top:0; height:100%; display:flex; align-items:center; gap:6px; padding:0 10px; background:#070B14; border-left:1px solid var(--border); font-family:var(--mono); font-size:9px; color:var(--dim); z-index:2;}
.dot{width:6px;height:6px;display:inline-block;} .dot.ok{background:var(--up);} .dot.err{background:var(--dn);} .dot.ld{background:var(--amb);}
/* ── TOP BAR ── */
.topbar{height:44px; min-height:44px; display:flex; align-items:center; gap:10px; padding:0 12px; border-bottom:1px solid var(--border); background:var(--panel);}
.logo{font-weight:800; font-size:14px; letter-spacing:2px; color:var(--teal); white-space:nowrap;}
.logo span{color:var(--txt); font-weight:600;}
.searchwrap{position:relative; flex:1; max-width:420px;}
.searchwrap input{width:100%; height:26px; padding:0 8px; font-size:11px; background:#0A1020;}
.sresults{position:absolute; top:27px; left:0; right:0; background:var(--panel2); border:1px solid var(--teal); z-index:60; max-height:300px; overflow-y:auto;}
.sresult{display:flex; gap:8px; align-items:baseline; padding:6px 8px; cursor:pointer; border-bottom:1px solid var(--line);}
.sresult:hover{background:#16233C;}
.stype{font-size:8px; font-weight:700; letter-spacing:1px; color:var(--teal); min-width:46px;}
.ssub{color:var(--dim); font-size:10px; margin-left:auto;}
.tbtn{height:26px; padding:0 10px; font-family:var(--sans); font-weight:700; font-size:10px; letter-spacing:1px; background:var(--panel2); border:1px solid var(--border); color:var(--txt);}
.tbtn:hover{border-color:var(--teal); color:var(--teal);}
.tbtn.on{background:var(--teal); color:#06251F; border-color:var(--teal);}
.clock{font-family:var(--mono); font-size:12px; color:var(--teal); margin-left:auto; white-space:nowrap;}
/* ── LAYOUT ── */
.layout{display:flex; flex:1; min-height:0;}
.sidebar{width:190px; min-width:190px; border-right:1px solid var(--border); background:var(--panel); display:flex; flex-direction:column; padding-top:8px;}
.navitem{display:flex; align-items:center; gap:8px; padding:10px 12px; cursor:pointer; border-left:2px solid transparent;}
.navitem:hover{background:var(--panel2);}
.navitem.active{border-left-color:var(--teal); background:var(--panel2);}
.navitem.active .nname{color:var(--teal);}
.navkey{font-family:var(--mono); font-size:10px; color:var(--dim); border:1px solid var(--border); width:16px; height:16px; display:flex; align-items:center; justify-content:center;}
.nname{font-weight:700; font-size:10px; letter-spacing:1px;}
.ndesc{font-size:9px; color:var(--dim); margin-top:1px;}
.sfoot{margin-top:auto; padding:10px 12px; font-size:9px; color:var(--dim); border-top:1px solid var(--border); font-family:var(--mono);}
.content{flex:1; overflow-y:auto; padding:10px;}
.mhead{display:flex; align-items:baseline; gap:10px; margin-bottom:10px;}
.mtitle{font-size:15px; font-weight:800; letter-spacing:2px;}
.mdesc{font-size:10px; color:var(--dim); letter-spacing:1px;}
.grid{display:grid; grid-template-columns:repeat(12,1fr); gap:8px;}
.g3{grid-column:span 3;} .g4{grid-column:span 4;} .g5{grid-column:span 5;}
.g6{grid-column:span 6;} .g7{grid-column:span 7;} .g8{grid-column:span 8;} .g12{grid-column:span 12;}
/* ── PANEL ── */
.panel{background:var(--panel); border:1px solid var(--border); display:flex; flex-direction:column; min-width:0;}
.phead{display:flex; align-items:center; padding:6px 8px; border-bottom:1px solid var(--border); background:#0B1120;}
.ptitle{font-weight:700; font-size:10px; letter-spacing:1.5px; color:var(--txt);}
.pright{margin-left:auto; display:flex; align-items:center; gap:6px;}
.pbody{padding:8px; flex:1; min-width:0;}
.pfoot{padding:4px 8px; border-top:1px solid var(--line); font-size:9px; color:var(--dim); font-family:var(--mono);}
.badge{font-size:8px; font-weight:800; letter-spacing:1px; padding:2px 5px; font-family:var(--sans);}
.b-live{background:rgba(0,212,200,.15); color:var(--teal); border:1px solid var(--teal);}
.b-manual{background:rgba(255,176,32,.12); color:var(--amb); border:1px solid var(--amb);}
.b-est{background:rgba(139,124,246,.12); color:var(--pur); border:1px solid var(--pur);}
.b-user{background:rgba(214,222,235,.08); color:var(--dim); border:1px solid var(--dim);}
.b-err{background:rgba(255,77,109,.15); color:var(--dn); border-color:var(--dn);}
/* ── TABLES / TILES / STATS ── */
.tbl{width:100%; border-collapse:collapse;}
.tbl th{font-family:var(--sans); font-weight:700; font-size:8px; letter-spacing:1px; color:var(--dim); text-align:left; padding:3px 6px; border-bottom:1px solid var(--border); text-transform:uppercase;}
.tbl td{font-family:var(--mono); font-size:11px; padding:4px 6px; border-bottom:1px solid var(--line); white-space:nowrap;}
.tbl td.r,.tbl th.r{text-align:right;}
.tiles{display:grid; grid-template-columns:repeat(auto-fill,minmax(108px,1fr)); gap:6px;}
.tile{background:var(--panel2); border:1px solid var(--border); padding:6px 8px; min-width:0;}
.tile .tl{font-size:8px; font-weight:700; letter-spacing:1px; color:var(--dim);}
.tile .tv{font-family:var(--mono); font-size:14px; margin:2px 0;}
.tile .tc{font-family:var(--mono); font-size:10px;}
.stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px;}
.stat{background:var(--panel2); border:1px solid var(--border); padding:6px 8px;}
.stl{font-size:8px; font-weight:700; letter-spacing:1px; color:var(--dim); text-transform:uppercase;}
.stv{font-family:var(--mono); font-size:16px; margin:2px 0;}
.sts{font-family:var(--mono); font-size:9px; color:var(--dim);}
.chips{display:flex; gap:6px; flex-wrap:wrap;}
.chip{display:flex; gap:6px; align-items:baseline; background:var(--panel2); border:1px solid var(--border); padding:4px 8px; font-size:11px;}
.chl{font-size:8px; font-weight:700; letter-spacing:1px; color:var(--dim);}
/* ── EDITABLE ── */
.ef{display:flex; align-items:baseline; gap:6px; padding:3px 0; min-width:0;}
.efl{font-size:9px; font-weight:700; letter-spacing:.5px; color:var(--dim); text-transform:uppercase; min-width:90px;}
.efv{font-family:var(--mono); font-size:12px; cursor:pointer; border-bottom:1px dotted var(--border);}
.efv:hover{color:var(--teal);}
.efv .pencil{font-size:9px; color:var(--dim); margin-left:5px;}
.efv:hover .pencil{color:var(--teal);}
.efin{font-size:11px; padding:1px 4px; width:110px;}
.efin.wide{width:100%;}
.eft{font-family:var(--mono); font-size:8px; color:var(--dim); margin-left:auto; white-space:nowrap;}
.ecell{cursor:pointer; border-bottom:1px dotted transparent;}
.ecell:hover{color:var(--teal); border-bottom-color:var(--teal);}
.ecin{width:64px; font-size:11px; padding:0 3px;}
/* ── GAUGE / SLIDERS ── */
.gauge{padding:4px 0;}
.gtrack{position:relative; height:14px; background:linear-gradient(90deg,#00D47E,#FFB020 55%,#FF4D6D); border:1px solid var(--border);}
.gdim{position:absolute; top:0; bottom:0; right:0; background:rgba(7,11,20,.82);}
.gmark{position:absolute; top:-3px; bottom:-3px; width:2px; background:#FFF;}
.grow{display:flex; align-items:baseline; gap:10px; margin-top:6px;}
.gv{font-size:20px;} .gl{font-size:10px; font-weight:800; letter-spacing:1px;}
.slrow{display:flex; align-items:center; gap:8px; padding:3px 0;}
.slrow .efl{min-width:150px;}
.slv{font-family:var(--mono); font-size:11px; width:26px; text-align:right;}
/* ── HEAT ── */
.heatcell{text-align:right; font-family:var(--mono); font-size:11px; padding:4px 8px; border-bottom:1px solid var(--line);}
/* ── MODAL ── */
.overlay{position:fixed; inset:0; background:rgba(5,8,16,.8); z-index:100; display:flex; align-items:flex-start; justify-content:center; padding:30px 12px; overflow-y:auto;}
.mbox{background:var(--panel); border:1px solid var(--teal); width:680px; max-width:100%;}
.mhd{display:flex; align-items:center; padding:8px 12px; border-bottom:1px solid var(--border); background:#0B1120;}
.mhd .ptitle{font-size:12px;}
.mbody{padding:12px; display:flex; flex-direction:column; gap:8px;}
.flabel{font-size:9px; font-weight:700; letter-spacing:1px; color:var(--teal);}
textarea{width:100%; font-size:11px; padding:6px; resize:vertical; line-height:1.5;}
/* ── CALENDAR ── */
.calbar{width:240px; min-width:240px; border-left:1px solid var(--border); background:var(--panel); display:flex; flex-direction:column; overflow-y:auto;}
.calrow{display:flex; gap:6px; align-items:baseline; padding:5px 8px; border-bottom:1px solid var(--line); cursor:pointer; font-family:var(--mono); font-size:10px;}
.calrow:hover{background:var(--panel2);}
.caldate{color:var(--teal); white-space:nowrap;}
.calx{margin-left:auto; color:var(--dim); cursor:pointer; font-size:10px;} .calx:hover{color:var(--dn);}
/* ── NOTES / CARDS ── */
.notes{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:8px;}
.note{border:1px solid var(--border); border-top:2px solid var(--dim); background:var(--panel2); padding:8px;}
.note.WATCH{border-top-color:var(--amb);} .note.RISK{border-top-color:var(--dn);} .note.INFO{border-top-color:var(--teal);}
.ntitle{font-weight:700; font-size:11px; letter-spacing:.5px;}
.nbody{font-size:11px; color:var(--txt); margin-top:4px; white-space:pre-wrap; font-family:var(--mono); line-height:1.45;}
.nbar{display:flex; gap:6px; margin-top:6px; align-items:center;}
.xbtn{font-size:9px; padding:2px 6px; background:transparent; border:1px solid var(--border); color:var(--dim);}
.xbtn:hover{border-color:var(--teal); color:var(--teal);}
.case{border:1px solid var(--border); background:var(--panel2); padding:10px; display:flex; flex-direction:column; gap:6px;}
.case h3{font-size:12px; letter-spacing:1px; color:var(--teal);}
.case .cper{font-family:var(--mono); font-size:9px; color:var(--dim);}
.case dt{font-size:8px; font-weight:800; letter-spacing:1px; color:var(--dim); margin-top:4px;}
.case dd{font-size:11px; line-height:1.5; font-family:var(--mono); color:var(--txt);}
.case ul{margin-left:14px;} .case li{font-size:10.5px; font-family:var(--mono); line-height:1.55;}
/* ── TABS / JOURNAL ── */
.jtabs{display:flex; border-bottom:1px solid var(--border);}
.jtab{padding:8px 16px; font-weight:700; font-size:10px; letter-spacing:1.5px; color:var(--dim); cursor:pointer; border-bottom:2px solid transparent;}
.jtab.on{color:var(--teal); border-bottom-color:var(--teal);}
.thesis{border:1px solid var(--border); background:var(--panel2); padding:8px; margin-bottom:8px;}
.status{font-size:8px; font-weight:800; letter-spacing:1px; padding:2px 6px; cursor:pointer; border:1px solid;}
.st-active{color:var(--teal); border-color:var(--teal);} .st-confirmed{color:var(--up); border-color:var(--up);} .st-invalidated{color:var(--dn); border-color:var(--dn);}
/* ── MOBILE ── */
.tabbar{display:none;}
@media (max-width:1200px){ .g3,.g4,.g5{grid-column:span 6;} .g7,.g8{grid-column:span 12;} }
@media (max-width:860px){
  .sidebar{display:none;} .calbar{display:none;}
  .g3,.g4,.g5,.g6,.g7,.g8{grid-column:span 12;}
  .content{padding-bottom:64px;}
  .tabbar{display:flex; position:fixed; bottom:0; left:0; right:0; height:50px; background:var(--panel); border-top:1px solid var(--border); z-index:50;}
  .tabbar .ti{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; color:var(--dim);}
  .tabbar .ti.on{color:var(--teal); border-top:2px solid var(--teal);}
  .tabbar .ti .tk{font-family:var(--mono); font-size:12px; font-weight:600;}
  .tabbar .ti .tn{font-size:7px; font-weight:800; letter-spacing:.5px;}
  .clock{display:none;}
}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.15.0/umd/Recharts.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script type="text/babel" data-presets="react">
'use strict';
const {useState, useEffect, useRef, useMemo, useCallback, useContext, createContext} = React;
const RC = window.Recharts || {};

/* ───────────────────────── utils ───────────────────────── */
const sleep = ms => new Promise(r => setTimeout(r, ms));
const fmt = (v, d=2) => (v==null || isNaN(v)) ? '—' : Number(v).toLocaleString('en-US',{minimumFractionDigits:d, maximumFractionDigits:d});
const sgn = (v, d=2, suf='') => (v==null || isNaN(v)) ? '—' : (v>0?'+':'') + fmt(v,d) + suf;
const cls = v => (v==null || isNaN(v)) ? 'dim' : v>0 ? 'up' : v<0 ? 'dn' : 'dim';
const bp = v => (v==null || isNaN(v)) ? '—' : (v>0?'+':'') + Math.round(v*100) + 'bp';
const tsFmt = t => { if(!t) return ''; const d=new Date(t); const p=n=>String(n).padStart(2,'0'); return p(d.getMonth()+1)+'/'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes()); };
const todayISO = () => new Date().toISOString().slice(0,10);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const num = s => { const v = parseFloat(String(s).replace(/[,%$]/g,'')); return isNaN(v) ? null : v; };

async function copyText(t){
  try { await navigator.clipboard.writeText(t); return true; }
  catch(e){
    const ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta);
    ta.select(); try{document.execCommand('copy');}catch(_e){} document.body.removeChild(ta); return true;
  }
}
function download(name, text){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));
  a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
}

/* ───────────────────────── fetch layer ───────────────────────── */
const PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
];
async function proxyFetch(url, {json=true, tries=3} = {}){
  let lastErr;
  for (let i=0; i<tries; i++){
    try{
      const r = await fetch(PROXIES[i % PROXIES.length](url));
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return json ? await r.json() : await r.text();
    }catch(e){ lastErr = e; await sleep(700 * (i+1)); }
  }
  throw lastErr;
}
async function pAll(items, fn, limit=5){
  const out = new Array(items.length); let i = 0;
  await Promise.all(Array.from({length: Math.min(limit, items.length)}, async () => {
    while (i < items.length){
      const idx = i++;
      try { out[idx] = {ok:true, v: await fn(items[idx], idx)}; }
      catch(e){ out[idx] = {ok:false, e}; }
    }
  }));
  return out;
}

/* Yahoo Finance v8 chart endpoint via proxy */
async function fetchChart(symbol, range='5d', interval='1d'){
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=${range}&interval=${interval}`;
  const j = await proxyFetch(url);
  const res = j && j.chart && j.chart.result && j.chart.result[0];
  if (!res) throw new Error('no chart data: ' + symbol);
  const meta = res.meta || {};
  const raw = ((res.indicators||{}).quote||[{}])[0].close || [];
  const closes = raw.filter(v => v != null);
  const n = closes.length;
  const price = meta.regularMarketPrice != null ? meta.regularMarketPrice : closes[n-1];
  if (price == null) throw new Error('no price: ' + symbol);
  const prev = n > 1 ? closes[n-2] : meta.chartPreviousClose;
  return {
    symbol, price, prev,
    chg:   prev != null ? price - prev : null,
    pct:   prev ? (price/prev - 1)*100 : null,
    pct1w: n > 5 ? (price/closes[n-6] - 1)*100 : null,
    pct1m: n > 2 ? (price/closes[0]   - 1)*100 : null,
    closes,
  };
}
async function fetchQuotes(symbols, range='5d'){
  const res = await pAll(symbols, s => fetchChart(s, range), 5);
  const map = {}; let ok = 0;
  res.forEach((r, i) => { if (r.ok){ map[symbols[i]] = r.v; ok++; } });
  if (!ok) throw new Error('all quote fetches failed');
  return map;
}

/* FRED public CSV (no API key) via proxy */
const FRED_COSD = new Date(Date.now() - 3*365*86400e3).toISOString().slice(0,10);
async function fetchFredSeries(id){
  const url = `https://fred.stlouisfed.org/graph/fredgraph.csv?id=${id}&cosd=${FRED_COSD}`;
  const text = await proxyFetch(url, {json:false});
  const lines = String(text).trim().split('\n').slice(1);
  const obs = [];
  for (const line of lines){
    const parts = line.replace('\r','').split(',');
    const v = parseFloat(parts[1]);
    if (parts[1] && parts[1] !== '.' && !isNaN(v)) obs.push({date: parts[0], value: v});
  }
  if (!obs.length) throw new Error('no observations: ' + id);
  return obs;
}
async function fetchFredMap(ids){
  const res = await pAll(ids, fetchFredSeries, 5);
  const map = {}; let ok = 0;
  res.forEach((r, i) => { map[ids[i]] = r.ok ? r.v : null; if (r.ok) ok++; });
  if (!ok) throw new Error('all FRED fetches failed');
  return map;
}
const last  = obs => (obs && obs.length) ? obs[obs.length-1] : null;
const lastV = obs => { const l = last(obs); return l ? l.value : null; };
const lastD = obs => { const l = last(obs); return l ? l.date  : null; };
const delta = (obs, n) => (obs && obs.length > n) ? obs[obs.length-1].value - obs[obs.length-1-n].value : null;
const yoy   = (obs, back=0) => { if(!obs) return null; const i = obs.length-1-back; return i >= 12 ? (obs[i].value/obs[i-12].value - 1)*100 : null; };

/* Atlanta Fed GDPNow — scrape latest estimate off the public page */
async function fetchGdpNow(){
  const html = await proxyFetch('https://www.atlantafed.org/cqer/research/gdpnow', {json:false});
  const text = String(html).replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ');
  const m = text.match(/Latest estimate:\s*([\-−–]?\d+(?:\.\d+)?)\s*percent\s*[—–-]*\s*([A-Z][a-z]+ \d{1,2},? \d{4})?/);
  if (!m) throw new Error('GDPNow parse failed');
  return { value: parseFloat(m[1].replace(/[−–]/,'-')), asof: m[2] || '' };
}

/* ───────────────────────── hooks ───────────────────────── */
function useLocalStorage(key, initial){
  const [v, setV] = useState(() => {
    try { const s = localStorage.getItem(key); return s != null ? JSON.parse(s) : initial; }
    catch(e){ return initial; }
  });
  const set = useCallback(val => {
    setV(prev => {
      const next = typeof val === 'function' ? val(prev) : val;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch(e){}
      return next;
    });
  }, [key]);
  return [v, set];
}
const _cache = {};
function useAsyncData(key, fetcher, {refreshMs=0, ttlMs=55000} = {}){
  const [state, setState] = useState(() => _cache[key]
    ? {data:_cache[key].v, status:'ok', t:_cache[key].t}
    : {data:null, status:'loading', t:0});
  const fRef = useRef(fetcher); fRef.current = fetcher;
  useEffect(() => {
    let dead = false;
    async function load(force){
      const c = _cache[key];
      if (!force && c && Date.now() - c.t < ttlMs){
        setState({data:c.v, status:'ok', t:c.t}); return;
      }
      try{
        const v = await fRef.current();
        _cache[key] = {v, t: Date.now()};
        if (!dead) setState({data:v, status:'ok', t: Date.now()});
      }catch(e){
        if (!dead) setState(s => ({data:s.data, status:'error', t:s.t}));
      }
    }
    load(false);
    let iv; if (refreshMs) iv = setInterval(() => load(true), refreshMs);
    return () => { dead = true; if (iv) clearInterval(iv); };
  }, [key, refreshMs, ttlMs]);
  return state;
}
function useClock(){
  const [t, setT] = useState(() => new Date());
  useEffect(() => { const iv = setInterval(() => setT(new Date()), 1000); return () => clearInterval(iv); }, []);
  return t;
}
function useFlash(){
  const [on, setOn] = useState(false);
  const flash = useCallback(() => { setOn(true); setTimeout(() => setOn(false), 1200); }, []);
  return [on, flash];
}

function curveShape(c){
  const s210 = c['10Y'] != null && c['2Y'] != null ? c['10Y'] - c['2Y'] : null;
  const s3m10 = c['10Y'] != null && c['3M'] != null ? c['10Y'] - c['3M'] : null;
  if (s210 == null) return ['—', 'var(--dim)'];
  if (s210 < -0.05 || (s3m10 != null && s3m10 < -0.15)) return ['INVERTED', 'var(--dn)'];
  if (s210 < 0.20) return ['FLAT', 'var(--amb)'];

  return ['NORMAL', 'var(--up)'];
}

                    </span>
                    <span className="eft" style={{marginLeft:'auto'}}>{tsFmt(j.t)}</span>
                    <button className="xbtn" onClick={() => setDraft({...j})}>EDIT</button>
                    <button className="xbtn" onClick={() => setJournal(js => js.filter(x => x.id !== j.id))}>DEL</button>
                  </div>
                  <div className="nbody">{j.body}</div>
                </div>
              ))}
            </div>
          ) : null}

          {tab === 'LIBRARY' ? (
            <div>
              <div className="dim mono" style={{fontSize:9, marginBottom:8}}>8 PRE-LOADED HISTORICAL CASE STUDIES — pattern library for the thesis journal</div>
              <div className="notes" style={{gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))'}}>
                {CASE_STUDIES.map(c => <CaseCard key={c.id} c={c}/>)}
              </div>
            </div>
          ) : null}

        </div>
      </div>
    </div>
  );
}

/* ═══════════════ APP ═══════════════ */
function App(){
  const [active, setActive] = useState(0);
  const [m6Tab, setM6Tab] = useState('NOTES');
  const [journal, setJournal] = useLocalStorage('ani.journal.v1', []);
  const [manual, setManualRaw] = useLocalStorage('ani.manual.v1', {});
  const [showCal, setShowCal] = useLocalStorage('ani.showcal', true);
  const [showBrief, setShowBrief] = useState(false);
  const setField = useCallback((k, v) => setManualRaw(m => ({...m, [k]: {v, t: Date.now()}})), [setManualRaw]);
  const clock = useClock();
  useEffect(() => {
    const h = e => {
      const t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      if (e.key >= '1' && e.key <= '6'){ setActive(+e.key - 1); }
      if (e.key === '/'){ e.preventDefault(); const el = document.getElementById('gsearch'); if (el) el.focus(); }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);
  const searchIndex = useMemo(() => [
    ...MODULES.map((m, i) => ({type:'MODULE', label: m.name, sub: m.desc, go: () => setActive(i)})),
    ...CASE_STUDIES.map(c => ({type:'CASE', label: c.title, sub: c.period, go: () => { setActive(5); setM6Tab('LIBRARY'); }})),
    ...journal.map(j => ({type:'THESIS', label: j.title, sub: j.status.toUpperCase(), go: () => { setActive(5); setM6Tab('JOURNAL'); }})),
  ], [journal]);
  const ctx = useMemo(() => ({manual, setField}), [manual, setField]);
  const mod = active === 0 ? <ModulePulse/> : active === 1 ? <ModulePolicy/> : active === 2 ? <ModuleCredit/>
    : active === 3 ? <ModuleEquity/> : active === 4 ? <ModuleGlobal/>
    : <ModuleJournal tab={m6Tab} setTab={setM6Tab} journal={journal} setJournal={setJournal}/>;
  const p = n => String(n).padStart(2, '0');
  return (
    <ManualCtx.Provider value={ctx}>
      <div className="app">
        <Ticker/>
        <div className="topbar">
          <span className="logo">ANI<span>TERMINAL</span></span>
          <GlobalSearch searchIndex={searchIndex}/>
          <button className="tbtn" onClick={() => setShowBrief(true)}>☀ BRIEF</button>
          <button className={'tbtn' + (showCal ? ' on' : '')} onClick={() => setShowCal(v => !v)}>CAL</button>
          <span className="clock">{p(clock.getHours())}:{p(clock.getMinutes())}:{p(clock.getSeconds())}</span>
        </div>
        <div className="layout">
          <Sidebar active={active} setActive={setActive}/>
          <div className="content">
            <div className="mhead">
              <span className="mtitle">{(active+1) + ' · ' + MODULES[active].name}</span>
              <span className="mdesc">{MODULES[active].desc}</span>
            </div>
            {mod}
          </div>
          {showCal ? <CalendarBar/> : null}
        </div>
        <TabBar active={active} setActive={setActive}/>
        {showBrief ? <MorningBrief onClose={() => setShowBrief(false)}/> : null}
      </div>
    </ManualCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
